<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Akıllı Dava Analiz Sistemi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{font-family:Arial;background:#f2f4f8;padding:20px;}
button{padding:10px 15px;margin-top:10px;}
#result{margin-top:20px;padding:15px;background:white;border-radius:10px;}
.high{color:red;font-weight:bold;font-size:18px;}
.medium{color:orange;font-weight:bold;font-size:18px;}
.low{color:green;font-weight:bold;font-size:18px;}
.box{background:#eef;padding:10px;border-radius:8px;margin-bottom:10px;}
</style>
</head>

<body>

<h2>⚖️ Akıllı Dava Analiz Sistemi</h2>

<input type="file" id="pdfFile" accept=".pdf">
<br>
<button onclick="analyzePDF()">Analiz Et</button>

<div id="result"></div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function analyzePDF(){

const file = document.getElementById("pdfFile").files[0];
if(!file){
alert("PDF seçiniz.");
return;
}

const reader = new FileReader();

reader.onload = async function(){

const typedarray = new Uint8Array(this.result);
const pdf = await pdfjsLib.getDocument(typedarray).promise;

let fullText="";

for(let i=1;i<=pdf.numPages;i++){
const page = await pdf.getPage(i);
const content = await page.getTextContent();
content.items.forEach(item=>{
fullText+=item.str.toLowerCase()+" ";
});
}

let result="";

/* ===============================
   🔴 İCRA STRATEJİ MOTORU
================================ */

if(fullText.includes("icra")){

result+="<div class='high'>🔴 YÜKSEK RİSK: İCRA DOSYASI</div><br>";

let riskScore=70;

if(fullText.includes("haciz")){
riskScore+=20;
result+="⚠️ Haciz aşamasına geçilmiş olabilir.<br>";
}

if(fullText.includes("7 gün")){
result+="⚠️ 7 günlük itiraz süresi kritik.<br>";
}

if(fullText.includes("faiz")){
result+="⚠️ Faiz oranı kontrol edilmeli (fazla hesap ihtimali).<br>";
}

result+="<div class='box'><strong>📉 En Düşük Maliyetli Çözüm Sıralaması:</strong><br>";
result+="1️⃣ Faiz indirimi pazarlığı<br>";
result+="2️⃣ Taksitlendirme<br>";
result+="3️⃣ Süre içindeyse itiraz<br>";
result+="4️⃣ Menfi tespit (yüksek maliyetli)<br></div>";

result+="Risk Skoru: "+riskScore+"/100<br><br>";
}

/* ===============================
   👷 İŞÇİ ALACAĞI STRATEJİ MOTORU
================================ */

if(fullText.includes("kıdem") ||
fullText.includes("ihbar") ||
fullText.includes("fazla mesai") ||
fullText.includes("ücret")){

result+="<div class='medium'>🟠 İŞÇİ ALACAĞI DOSYASI</div><br>";

let strategy="<div class='box'><strong>📌 Stratejik Kontrol Listesi:</strong><br>";

if(fullText.includes("kıdem")){
strategy+="• Çalışma süresi ve brüt ücret doğru hesaplandı mı?<br>";
}

if(fullText.includes("ihbar")){
strategy+="• Fesih şekli yazılı delil ile desteklenmeli.<br>";
}

if(fullText.includes("fazla mesai")){
strategy+="• Bordro ile banka kaydı karşılaştırılmalı.<br>";
}

if(fullText.includes("ücret")){
strategy+="• Ücret alacağı için faiz başlangıç tarihi kontrol edilmeli.<br>";
}

if(fullText.includes("sgk")){
strategy+="• SGK hizmet dökümü ile prim uyumu kontrol edilmeli.<br>";
}

strategy+="• Hesap cetveli dosyaya eklenmeli.<br>";
strategy+="• Zamanaşımı süresi kontrol edilmeli.<br>";
strategy+="</div>";

result+=strategy;
}

/* ===============================
   📖 ANAYASA BAĞLANTI ANALİZİ
================================ */

function anayasa(madde,text){
result+="<div class='box'><strong>📖 Anayasa Madde "+madde+":</strong><br>"+text+"</div>";
}

if(fullText.includes("36")){
anayasa("36","Hak arama özgürlüğü. Savunma hakkı kısıtlanamaz.");
}

if(fullText.includes("35")){
anayasa("35","Mülkiyet hakkı korunur. İcra işlemleri bu kapsamda değerlendirilir.");
}

if(fullText.includes("49")){
anayasa("49","Çalışma hakkı devlet güvencesindedir.");
}

if(fullText.includes("55")){
anayasa("55","Ücret emeğin karşılığıdır ve korunur.");
}

if(fullText.includes("60")){
anayasa("60","Sosyal güvenlik hakkı anayasal güvencedir.");
}

/* =============================== */

if(result===""){
result="<div class='low'>Belirgin risk tespit edilmedi.</div>";
}

document.getElementById("result").innerHTML=result;

};

reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
