<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dava Güvende AI - V13 (Çift Yönlü Analiz)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --davaci-color: #00b894; --davali-color: #d63031; --dark: #2d3436; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Ekranı İkiye Bölme */
        .split-container { display: flex; height: 100vh; width: 100vw; }
        
        .side { flex: 1; padding: 30px; overflow-y: auto; transition: 0.3s; position: relative; }
        .davaci-side { background: #f0fff4; border-right: 2px solid #ddd; }
        .davali-side { background: #fff5f5; }

        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .davaci-title { color: var(--davaci-color); }
        .davali-title { color: var(--davali-color); }

        /* Yükleme Alanları */
        .upload-box { background: white; border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; margin-top: 10px; }
        .btn-davaci { background: var(--davaci-color); }
        .btn-davali { background: var(--davali-color); }

        /* Yapay Zeka Sonuç Kartları */
        .ai-card { background: white; border-radius: 10px; padding: 20px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid; }
        .ai-davaci { border-top-color: var(--davaci-color); }
        .ai-davali { border-top-color: var(--davali-color); }

        textarea { width: 100%; height: 200px; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd; padding: 10px; font-family: monospace; }
        .loading-spinner { display: none; color: #666; font-style: italic; }
        
        .vs-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--dark); color: white; padding: 15px; border-radius: 50%; font-weight: bold; z-index: 10; border: 4px solid white; }
    </style>
</head>
<body>

<div class="vs-badge">VS</div>

<div class="split-container">
    
    <div class="side davaci-side" id="davaciPanel">
        <h2 class="davaci-title">🟢 DAVACI MODU</h2>
        <p style="text-align:center">"Hakkımı Söke Söke Alacağım"</p>
        
        <div class="upload-box">
            <strong>Mağduriyet Belgesi Yükle</strong><br><br>
            <input type="file" id="pdfDavaci" accept=".pdf"><br>
            <button class="btn btn-davaci" onclick="process('davaci')">AI ANALİZİ BAŞLAT</button>
        </div>
        
        <div id="loading-davaci" class="loading-spinner">AI Strateji oluşturuyor...</div>
        <div id="result-davaci"></div>
    </div>

    <div class="side davali-side" id="davaliPanel">
        <h2 class="davali-title">🔴 DAVALI MODU</h2>
        <p style="text-align:center">"Haksız Talepleri Reddediyorum"</p>
        
        <div class="upload-box">
            <strong>Tebligat / Ödeme Emri Yükle</strong><br><br>
            <input type="file" id="pdfDavali" accept=".pdf"><br>
            <button class="btn btn-davali" onclick="process('davali')">AI SAVUNMA KUR</button>
        </div>

        <div id="loading-davali" class="loading-spinner">AI Savunma kalkanı hazırlıyor...</div>
        <div id="result-davali"></div>
    </div>

</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    async function process(mode) {
        const fileInput = document.getElementById('pdf' + mode.charAt(0).toUpperCase() + mode.slice(1));
        const file = fileInput.files[0];
        const loading = document.getElementById('loading-' + mode);
        const resultDiv = document.getElementById('result-' + mode);

        if (!file) return alert("Lütfen önce dosya seç!");

        loading.style.display = "block";
        resultDiv.innerHTML = "";

        const reader = new FileReader();
        reader.onload = async function() {
            try {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(s => s.str).join(" ").toLowerCase();
                }
                
                renderAI(mode, text);
            } catch (err) {
                alert("Hata: " + err.message);
            } finally {
                loading.style.display = "none";
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function renderAI(mode, text) {
        const target = document.getElementById('result-' + mode);
        let html = "";

        if (mode === 'davaci') {
            html = `
            <div class="ai-card ai-davaci">
                <h3>🧠 AI Hücum Stratejisi</h3>
                <p><strong>Dosyayı okudum, alacaklarımızı almak için planım şu:</strong></p>
                <ul>
                    <li>Belgede eksik ödenen kalemleri saptadım.</li>
                    <li><strong>İddiam:</strong> "Alın terim ödenmedi, iş akdi haksız feshedildi."</li>
                    <li><strong>AI Hamlesi:</strong> Emsal ücret araştırması isteyerek tazminatı en üst sınırdan hesaplatacağım.</li>
                </ul>
                <textarea>
[MAHKEMEYE]
Davacıyım, hakkım olan kıdem ve ihbar tazminatlarımın faiziyle birlikte davalıdan tahsilini, alacaklarımın 'Belirsiz Alacak' olarak değerlendirilmesini arz ederim.
İMZA: [Adın Soyadın]</textarea>
            </div>`;
        } else {
            html = `
            <div class="ai-card ai-davali">
                <h3>🧠 AI Savunma Stratejisi</h3>
                <p><strong>Bu borç/dava bana karşı açılmış. Savunma hattım hazır:</strong></p>
                <ul>
                    <li><strong>İtirazım:</strong> "Borcum yoktur, zamanaşımı söz konusudur."</li>
                    <li><strong>AI Hamlesi:</strong> Karşı tarafın iddialarının ispatlanamadığını, belgelerin geçersiz olduğunu savunacağım.</li>
                    <li><strong>Sıyrılma Planı:</strong> Arabuluculuk usul hatalarını kullanarak davayı reddettireceğim.</li>
                </ul>
                <textarea>
[MAHKEMEYE]
Davalıyım, haksız açılan bu davanın reddini savunuyorum. Karşı tarafın iddiaları asılsızdır, borç zamanaşımına uğramıştır. 
İMZA: [Adın Soyadın]</textarea>
            </div>`;
        }
        target.innerHTML = html;
    }
</script>

</body>
</html>
