<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Akıllı Dava Analiz Sistemi ULTRA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
button{padding:10px 15px;margin-top:10px;}
#result{margin-top:20px;padding:15px;background:white;border-radius:10px;}
.high{color:red;font-weight:bold;font-size:18px;}
.medium{color:orange;font-weight:bold;font-size:18px;}
.low{color:green;font-weight:bold;font-size:18px;}
.box{background:#eef;padding:12px;border-radius:8px;margin-bottom:12px;}
.anayasa{background:#f9f9f9;padding:10px;border-left:4px solid #444;margin-bottom:8px;}
</style>
</head>

<body>

<h2>⚖️ Akıllı Dava Analiz Sistemi ULTRA</h2>

<input type="file" id="pdfFile" accept=".pdf">
<br>
<button onclick="analyzePDF()">Analiz Et</button>

<div id="result"></div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function analyzePDF(){

const file = document.getElementById("pdfFile").files[0];
if(!file){ alert("PDF seçiniz."); return; }

const reader = new FileReader();

reader.onload = async function(){

const typedarray = new Uint8Array(this.result);
const pdf = await pdfjsLib.getDocument(typedarray).promise;

let fullText="";

for(let i=1;i<=pdf.numPages;i++){
const page = await pdf.getPage(i);
const content = await page.getTextContent();
content.items.forEach(item=>{
fullText+=item.str.toLowerCase()+" ";
});
}

let result="";
let anayasaList=[];

/* ================= ICRA ================= */

if(fullText.includes("icra")){

result+="<div class='high'>🔴 YÜKSEK RİSK: İCRA DOSYASI</div><br>";

result+="<div class='box'><strong>Önerilen Çıkış Yolları:</strong><br>";
result+="1️⃣ Faiz indirimi pazarlığı<br>";
result+="2️⃣ Taksit talebi<br>";
result+="3️⃣ Süre içindeyse itiraz<br>";
result+="4️⃣ Usulsüz tebligat kontrolü<br>";
result+="5️⃣ Yetki itirazı ihtimali<br>";
result+="6️⃣ Zamanaşımı incelemesi<br>";
result+="</div>";

anayasaList.push("2","5","10","35","36","90");
}

/* ================= ISCI ================= */

if(fullText.includes("kıdem") ||
fullText.includes("ihbar") ||
fullText.includes("fazla mesai") ||
fullText.includes("ücret")){

result+="<div class='medium'>🟠 İŞÇİ ALACAĞI DOSYASI</div><br>";

result+="<div class='box'><strong>Stratejik Kontroller:</strong><br>";
result+="• Hesap cetveli eklenmeli<br>";
result+="• Zamanaşımı (5 yıl) kontrol<br>";
result+="• SGK prim uyumu<br>";
result+="• Faiz başlangıç tarihi<br>";
result+="• Yazılı delil gücü artırılmalı<br>";
result+="</div>";

anayasaList.push("2","10","36","48","49","50","55","60","90");
}

/* ================= ANAYASA DETAY ================= */

function anayasaMadde(madde,aciklama){
result+="<div class='anayasa'><strong>Anayasa Madde "+madde+":</strong><br>"+aciklama+"</div>";
}

if(anayasaList.includes("2")){
anayasaMadde("2","Türkiye Cumhuriyeti sosyal bir hukuk devletidir. Devlet işlemleri keyfi olamaz.");
}
if(anayasaList.includes("5")){
anayasaMadde("5","Devlet kişinin temel haklarını korumakla yükümlüdür.");
}
if(anayasaList.includes("10")){
anayasaMadde("10","Kanun önünde eşitlik ilkesi. Ayrımcılık yapılamaz.");
}
if(anayasaList.includes("35")){
anayasaMadde("35","Mülkiyet hakkı korunur. İcra işlemleri ölçülü olmalıdır.");
}
if(anayasaList.includes("36")){
anayasaMadde("36","Hak arama özgürlüğü ve adil yargılanma hakkı güvence altındadır.");
}
if(anayasaList.includes("48")){
anayasaMadde("48","Çalışma ve sözleşme özgürlüğü korunur.");
}
if(anayasaList.includes("49")){
anayasaMadde("49","Çalışma hakkı devlet güvencesindedir.");
}
if(anayasaList.includes("50")){
anayasaMadde("50","Çalışma şartları insan onuruna uygun olmalıdır.");
}
if(anayasaList.includes("55")){
anayasaMadde("55","Ücret emeğin karşılığıdır ve korunur.");
}
if(anayasaList.includes("60")){
anayasaMadde("60","Sosyal güvenlik hakkı anayasal güvencedir.");
}
if(anayasaList.includes("90")){
anayasaMadde("90","Uluslararası insan hakları sözleşmeleri iç hukuka üstünlük sağlar.");
}

if(result===""){
result="<div class='low'>Belirgin risk tespit edilmedi.</div>";
}

document.getElementById("result").innerHTML=result;

};

reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
