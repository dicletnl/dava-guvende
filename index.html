<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Akıllı Dava Analiz Sistemi PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{font-family:Arial;background:#f2f4f8;padding:20px;}
button{padding:10px 15px;margin-top:10px;}
#result{margin-top:20px;padding:15px;background:white;border-radius:10px;}
.high{color:red;font-weight:bold;font-size:18px;}
.medium{color:orange;font-weight:bold;font-size:18px;}
.low{color:green;font-weight:bold;font-size:18px;}
.box{background:#eef;padding:10px;border-radius:8px;margin-bottom:10px;}
</style>
</head>

<body>

<h2>⚖️ Akıllı Dava Analiz Sistemi PRO</h2>

<input type="file" id="pdfFile" accept=".pdf">
<br>
<button onclick="analyzePDF()">Analiz Et</button>

<div id="result"></div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function analyzePDF(){

const file = document.getElementById("pdfFile").files[0];
if(!file){ alert("PDF seçiniz."); return; }

const reader = new FileReader();

reader.onload = async function(){

const typedarray = new Uint8Array(this.result);
const pdf = await pdfjsLib.getDocument(typedarray).promise;

let fullText="";

for(let i=1;i<=pdf.numPages;i++){
const page = await pdf.getPage(i);
const content = await page.getTextContent();
content.items.forEach(item=>{
fullText+=item.str.toLowerCase()+" ";
});
}

let result="";
let riskScore=0;

/* ===============================
   🔴 GELİŞMİŞ İCRA ANALİZİ
================================ */

if(fullText.includes("icra")){

riskScore=60;
result+="<div class='high'>🔴 YÜKSEK RİSK: İCRA DOSYASI</div><br>";

if(fullText.includes("haciz")){
riskScore+=15;
result+="⚠️ Haciz aşaması tespit edildi.<br>";
}

if(fullText.includes("7 gün")){
riskScore+=10;
result+="⚠️ 7 günlük itiraz süresi kritik.<br>";
}

if(fullText.includes("tebligat")){
result+="⚠️ Tebligat usulü kontrol edilmeli (usulsüzlük ihtimali).<br>";
}

if(fullText.includes("yetki")){
result+="⚠️ Yetkili icra dairesi kontrol edilmeli.<br>";
}

if(fullText.includes("faiz")){
riskScore+=5;
result+="⚠️ Faiz oranı ve başlangıç tarihi kontrol edilmeli.<br>";
}

result+="<div class='box'><strong>📉 En Düşük Maliyetli Çözüm:</strong><br>";
result+="1️⃣ Faiz indirimi teklif et (%20-40 arası pazarlık önerilir)<br>";
result+="2️⃣ Taksitlendirme talebi<br>";
result+="3️⃣ Süre içindeyse borca itiraz<br>";
result+="4️⃣ Menfi tespit (son çare)<br></div>";

result+="Risk Skoru: "+riskScore+"/100<br><br>";
}

/* ===============================
   👷 GELİŞMİŞ İŞÇİ ANALİZİ
================================ */

if(fullText.includes("kıdem") ||
fullText.includes("ihbar") ||
fullText.includes("fazla mesai") ||
fullText.includes("ücret")){

let workerRisk=40;

result+="<div class='medium'>🟠 İŞÇİ ALACAĞI DOSYASI</div><br>";

let strategy="<div class='box'><strong>📌 Stratejik Kontrol:</strong><br>";

if(fullText.includes("kıdem")){
workerRisk+=10;
strategy+="• Kıdem hesaplaması brüt ücret üzerinden kontrol edilmeli.<br>";
}

if(fullText.includes("ihbar")){
strategy+="• Fesih nedeni yazılı delille desteklenmeli.<br>";
}

if(fullText.includes("fazla mesai")){
workerRisk+=10;
strategy+="• Fazla mesai bordro ve banka kaydı karşılaştırılmalı.<br>";
}

if(fullText.includes("ücret")){
strategy+="• Faiz başlangıcı fesih tarihi mi kontrol edilmeli.<br>";
}

if(fullText.includes("sgk")){
strategy+="• SGK hizmet dökümü ile prim uyumu kontrol edilmeli.<br>";
}

strategy+="• Hesap cetveli eklenmeli.<br>";
strategy+="• Zamanaşımı süresi kontrol edilmeli (5 yıl).<br>";
strategy+="</div>";

result+=strategy;
result+="Risk Skoru: "+workerRisk+"/100<br><br>";
}

/* ===============================
   📖 AKILLI ANAYASA BAĞLANTISI
================================ */

function anayasa(madde,text){
result+="<div class='box'><strong>📖 Anayasa Madde "+madde+":</strong><br>"+text+"</div>";
}

if(fullText.includes("savunma") || fullText.includes("hak arama")){
anayasa("36","Hak arama özgürlüğü ve adil yargılanma hakkı.");
}

if(fullText.includes("mülkiyet")){
anayasa("35","Mülkiyet hakkı korunur.");
}

if(fullText.includes("çalışma")){
anayasa("49","Çalışma hakkı devlet güvencesindedir.");
}

if(fullText.includes("ücret")){
anayasa("55","Ücret emeğin karşılığıdır ve korunur.");
}

if(fullText.includes("sgk") || fullText.includes("prim")){
anayasa("60","Sosyal güvenlik hakkı anayasal güvencedir.");
}

/* =============================== */

if(result===""){
result="<div class='low'>Belirgin risk tespit edilmedi.</div>";
}

document.getElementById("result").innerHTML=result;

};

reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
