<script>
async function analyzePDF() {

const file = document.getElementById("pdfFile").files[0];
if (!file) {
alert("Lütfen bir dosya seçin.");
return;
}

const reader = new FileReader();

reader.onload = async function() {

const typedarray = new Uint8Array(this.result);
const pdf = await pdfjsLib.getDocument(typedarray).promise;

let fullText = "";
for (let i = 1; i <= pdf.numPages; i++) {
const page = await pdf.getPage(i);
const content = await page.getTextContent();
content.items.forEach(item => {
fullText += item.str.toLowerCase() + " ";
});
}

let resultText = "";

/* ==============================
   🔴 İCRA ANALİZİ
============================== */

if(fullText.includes("icra")){

resultText += "<span style='color:red;font-size:18px;font-weight:bold'>🔴 YÜKSEK RİSK: İCRA DOSYASI TESPİT EDİLDİ</span><br><br>";

if(fullText.includes("7 gün")){
resultText += "⚠️ 7 günlük itiraz süresi olabilir.<br>";
}

if(fullText.includes("haciz")){
resultText += "⚠️ Dosya haciz aşamasında olabilir.<br>";
}

resultText += "<br><strong>📌 En Ucuz Kurtulma Yolları:</strong><br><br>";
resultText += "1️⃣ Alacaklı ile faiz indirimi pazarlığı yap.<br>";
resultText += "2️⃣ Taksitlendirme talep et.<br>";
resultText += "3️⃣ Süre içindeysen itiraz et.<br>";
resultText += "4️⃣ Borç sana ait değilse menfi tespit davası değerlendir.<br><br>";
}

/* ==============================
   👷 İŞÇİ ALACAKLARI ANALİZİ
============================== */

if(fullText.includes("kıdem") || fullText.includes("ihbar") || fullText.includes("fazla mesai")){

resultText += "<span style='color:blue;font-size:18px;font-weight:bold'>👷 İŞÇİ ALACAĞI TESPİT EDİLDİ</span><br><br>";

resultText += "📌 Kontrol edilmesi gerekenler:<br>";
resultText += "- Kıdem tazminatı doğru hesaplanmış mı?<br>";
resultText += "- İhbar süresi doğru mu?<br>";
resultText += "- Fazla mesai hesaplaması var mı?<br>";
resultText += "- SGK primleri tam yatırılmış mı?<br><br>";
}

/* ==============================
   📖 ANAYASA ANALİZİ
============================== */

function anayasaAcikla(madde, aciklama){
resultText += "<div style='background:#eef;padding:10px;border-radius:8px;margin-bottom:10px'>";
resultText += "<strong>📖 Anayasa Madde " + madde + ":</strong><br>";
resultText += aciklama;
resultText += "</div>";
}

if(fullText.includes("36")){
anayasaAcikla("36",
"Hak arama hürriyeti. Mahkemeye başvurma ve savunma hakkı anayasal güvence altındadır.");
}

if(fullText.includes("35")){
anayasaAcikla("35",
"Mülkiyet hakkı korunur. İcra işlemleri bu madde kapsamında değerlendirilir.");
}

if(fullText.includes("49")){
anayasaAcikla("49",
"Çalışma hakkı ve işçinin korunması devlet güvencesindedir.");
}

if(fullText.includes("55")){
anayasaAcikla("55",
"Ücret emeğin karşılığıdır. İşçi ücret alacakları anayasal koruma altındadır.");
}

if(fullText.includes("60")){
anayasaAcikla("60",
"Sosyal güvenlik hakkı anayasal haktır.");
}

/* ==============================
   ⚖️ SONUÇ YOKSA
============================== */

if(resultText === ""){
resultText = "Belirgin risk tespit edilmedi. Detaylı hukuki inceleme gerekebilir.";
}

document.getElementById("result").innerHTML = resultText;

};

reader.readAsArrayBuffer(file);
}
</script>
