<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dava Güvende AI - V17 (Kesin Çözüm)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --g: #00ff9d; --r: #ff4d4d; --dark: #0f172a; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; overflow: hidden; }
        
        .main-container { display: flex; height: 100vh; width: 100vw; }
        .side { flex: 1; padding: 30px; display: flex; flex-direction: column; position: relative; border-top: 6px solid; }
        
        /* Sol: Davacı */
        .plaintiff { border-color: var(--g); background: linear-gradient(180deg, #0f172a 0%, #064e3b 100%); border-right: 1px solid #334155; }
        /* Sağ: Davalı */
        .defendant { border-color: var(--r); background: linear-gradient(180deg, #0f172a 0%, #7f1d1d 100%); }

        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .input-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-g { background: var(--g); color: #000; }
        .btn-r { background: var(--r); color: #fff; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .status-log { font-family: 'Courier New', monospace; font-size: 12px; color: #94a3b8; margin: 10px 0; min-height: 20px; }
        
        textarea { width: 100%; flex-grow: 1; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #334155; padding: 15px; border-radius: 8px; font-family: 'Times New Roman', serif; font-size: 16px; line-height: 1.6; resize: none; outline: none; }
        .plaintiff textarea { border-color: var(--g); }
        .defendant textarea { border-color: var(--r); }
        
        .manual-input { width: 100%; height: 60px; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #ccc; padding: 5px; margin-top: 10px; font-size: 12px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="side plaintiff">
        <div class="header">
            <h2 style="color: var(--g);">⚖️ DAVACI SİSTEMİ</h2>
            <small>Saldırı Modu: Hak ve Alacak İkt
