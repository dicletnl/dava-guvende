<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dava Güvende AI - V10 (Davacı Odaklı)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --primary: #0984e3; --secondary: #6c5ce7; --success: #00b894; --danger: #d63031; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Dosya Yükleme Alanı */
        .upload-wrapper { 
            border: 3px dashed var(--primary); padding: 40px; text-align: center; border-radius: 12px; 
            background: #f8fbff; cursor: pointer; position: relative; transition: 0.3s;
        }
        .upload-wrapper:hover { background: #eff7ff; border-color: var(--secondary); }
        .upload-wrapper input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        
        .loading { display: none; text-align: center; margin: 20px; font-weight: bold; color: var(--secondary); }
        
        /* Sonuç Kartları */
        .result-section { margin-top: 25px; display: none; }
        .card { padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 6px solid var(--primary); background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card.is-davaci { border-color: var(--success); background: #f6fff9; }
        .card.uyari { border-color: var(--danger); background: #fff6f6; }
        
        textarea { width: 100%; height: 250px; margin-top: 15px; padding: 15px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Courier New', monospace; font-size: 13px; }
        h3 { margin-top: 0; color: #2d3436; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; background: var(--primary); color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 25px;">
        <h2>⚖️ Dava Güvende AI <small>v10.0</small></h2>
        <p>İşçi Hakları ve Davacı Strateji Merkezi</p>
    </div>

    <div class="upload-wrapper" id="dropZone">
        <div id="uploadContent">
            <img src="https://cdn-icons-png.flaticon.com/512/1091/1091916.png" width="50" style="margin-bottom: 10px;">
            <p><strong>PDF Dosyasını Buraya Bırakın veya Tıklayın</strong></p>
            <small>Yeni dosya seçildiği an eski analiz silinir ve yenisi başlar.</small>
        </div>
        <input type="file" id="pdfFile" accept=".pdf">
    </div>

    <div id="loading" class="loading">⌛ Dosya taranıyor, hukuki strateji oluşturuluyor...</div>

    <div id="result" class="result-section">
        </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const fileInput = document.getElementById('pdfFile');
    const resultDiv = document.getElementById('result');
    const loading = document.getElementById('loading');

    fileInput.addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // 1. Ekranı temizle ve hazırlık yap
        resultDiv.style.display = "none";
        resultDiv.innerHTML = "";
        loading.style.display = "block";
