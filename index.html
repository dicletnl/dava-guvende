<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dava Güvende AI - V16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --accent-g: #00d2d3; --accent-r: #ff6b6b; --dark: #121212; --panel: #1e272e; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: var(--dark); color: #ecf0f1; overflow: hidden; }
        
        .main-frame { display: flex; height: 100vh; width: 100vw; }
        .side { flex: 1; display: flex; flex-direction: column; padding: 30px; position: relative; border-top: 5px solid; }
        
        /* Panel Kimlikleri */
        .plaintiff { border-color: var(--accent-g); background: linear-gradient(180deg, #1e272e 0%, #0a3d34 100%); border-right: 1px solid #333; }
        .defendant { border-color: var(--accent-r); background: linear-gradient(180deg, #1e272e 0%, #3d0a0a 100%); }

        .ai-status { font-family: 'Courier New', monospace; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 5px; border-left: 3px solid; margin-bottom: 20px; font-size: 0.85rem; }
        .plaintiff .ai-status { border-color: var(--accent-g); color: var(--accent-g); }
        .defendant .ai-status { border-color: var(--accent-r); color: var(--accent-r); }

        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .upload-zone { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px dashed #555; text-align: center; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-g { background: var(--accent-g); color: #000; }
        .btn-r { background: var(--accent-r); color: #fff; }
        .btn:hover { opacity: 0.8; transform: scale(1.01); }

        textarea { width: 100%; flex-grow: 1; background: rgba(0,0,0,0.4); color: #fff; border: 1px solid #444; padding: 15px; border-radius: 5px; font-family: 'Times New Roman', serif; font-size: 1rem; line-height: 1.5; margin-top: 15px; resize: none; }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="side plaintiff">
        <h2>⚔️ SALDIRI BİRİMİ</h2>
        <small>Hukuki Müeyyide ve Hak Arama Motoru</small>
