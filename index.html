<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dava Güvende AI - V4</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px;}
button{padding:10px 15px;margin-top:10px;}
#result{margin-top:20px;padding:20px;background:white;border-radius:10px;}
.high{color:red;font-weight:bold;font-size:20px;}
.medium{color:orange;font-weight:bold;font-size:18px;}
.low{color:green;font-weight:bold;font-size:18px;}
.box{background:#eef;padding:15px;border-radius:8px;margin-bottom:15px;}
.section{margin-top:25px;font-weight:bold;font-size:18px;}
.anayasa{background:#f9f9f9;padding:10px;border-left:4px solid #333;margin-bottom:10px;}
.score{font-size:22px;font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<h2>⚖️ Dava Güvende AI – Gelişmiş Hukuk Motoru</h2>

<input type="file" id="pdfFile" accept=".pdf">
<br>
<button onclick="analyzePDF()">Analiz Et</button>

<div id="result"></div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

async function analyzePDF(){

const file = document.getElementById("pdfFile").files[0];
if(!file){ alert("PDF seçiniz."); return; }

const reader = new FileReader();

reader.onload = async function(){

const typedarray = new Uint8Array(this.result);
const pdf = await pdfjsLib.getDocument(typedarray).promise;

let fullText="";

for(let i=1;i<=pdf.numPages;i++){
const page = await pdf.getPage(i);
const content = await page.getTextContent();
content.items.forEach(item=>{
fullText+=item.str.toLowerCase()+" ";
});
}

let result="";
let riskScore=0;
let anayasaBag=[];

/* ================= İCRA ANALİZ ================= */

if(fullText.includes("icra")){

result+="<div class='high'>🔴 İCRA DOSYASI TESPİT EDİLDİ</div>";

riskScore=50;

if(fullText.includes("haciz")) riskScore+=15;
if(fullText.includes("7 gün")) riskScore+=10;
if(fullText.includes("faiz")) riskScore+=5;
if(fullText.includes("tebligat")) riskScore+=10;

result+="<div class='section'>📉 Maliyet Öncelikli Kurtulma Stratejisi</div>";
result+="<div class='box'>";
result+="1️⃣ Önce faiz indirimi pazarlığı (en düşük maliyet)<br>";
result+="2️⃣ Taksitlendirme talebi<br>";
result+="3️⃣ Süre içindeyse borca itiraz<br>";
result+="4️⃣ Usulsüz tebligat incelemesi<br>";
result+="5️⃣ Zamanaşımı ihtimali araştırması<br>";
result+="</div>";

result+="<div class='score'>Risk Skoru: "+riskScore+"/100</div>";

anayasaBag=["2","5","10","35","36","90"];
}

/* ================= İŞÇİ ANALİZ ================= */

if(fullText.includes("kıdem") ||
fullText.includes("ihbar") ||
fullText.includes("fazla mesai") ||
fullText.includes("ücret")){

result+="<div class='medium'>🟠 İŞÇİ ALACAĞI DOSYASI</div>";

riskScore=40;

if(fullText.includes("fazla mesai")) riskScore+=10;
if(fullText.includes("kıdem")) riskScore+=10;

result+="<div class='section'>📌 Delil Gücü Analizi</div>";
result+="<div class='box'>";
result+="• Hesap cetveli eklenmeli<br>";
result+="• SGK hizmet dökümü karşılaştırılmalı<br>";
result+="• Banka dekontları incelenmeli<br>";
result+="• Zamanaşımı süresi (5 yıl) kontrol edilmeli<br>";
result+="• Faiz başlangıç tarihi doğru belirlenmeli<br>";
result+="</div>";

result+="<div class='score'>Risk Skoru: "+riskScore+"/100</div>";

anayasaBag=["2","10","36","48","49","50","55","60","90"];
}

/* ================= ANAYASA MOTORU ================= */

result+="<div class='section'>📖 Anayasal Dayanaklar</div>";

function anayasaYaz(madde,detay){
result+="<div class='anayasa'><strong>Madde "+madde+":</strong><br>"+detay+"</div>";
}

anayasaBag.forEach(function(m){

if(m=="2")
anayasaYaz("2","Türkiye Cumhuriyeti sosyal bir hukuk devletidir. Devlet tüm işlemlerinde ölçülülük ve hukuka bağlılık ilkesine uymak zorundadır.");

if(m=="5")
anayasaYaz("5","Devlet, kişinin temel hak ve özgürlüklerini korumak ve geliştirmekle yükümlüdür.");

if(m=="10")
anayasaYaz("10","Kanun önünde eşitlik ilkesi gereği ayrımcılık yapılamaz.");

if(m=="35")
anayasaYaz("35","Mülkiyet hakkı korunur. İcra işlemleri ölçülü ve hukuka uygun olmalıdır.");

if(m=="36")
anayasaYaz("36","Hak arama özgürlüğü ve adil yargılanma hakkı güvence altındadır.");

if(m=="48")
anayasaYaz("48","Çalışma ve sözleşme özgürlüğü anayasal koruma altındadır.");

if(m=="49")
anayasaYaz("49","Çalışma hakkı devlet güvencesindedir.");

if(m=="50")
anayasaYaz("50","Çalışma şartları insan onuruna uygun olmalıdır.");

if(m=="55")
anayasaYaz("55","Ücret emeğin karşılığıdır ve devlet tarafından korunur.");

if(m=="60")
anayasaYaz("60","Herkes sosyal güvenlik hakkına sahiptir.");

if(m=="90")
anayasaYaz("90","Uluslararası insan hakları sözleşmeleri iç hukuka üstünlük sağlar.");
});

document.getElementById("result").innerHTML=result;

};

reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
